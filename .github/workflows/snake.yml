# ============================================================
#  Contribution Snake Animation
#  Generates an animated SVG of the GitHub contribution graph
#  being "eaten" by a snake, and publishes it to the
#  `output` branch so the README can reference it.
# ============================================================
name: Generate Snake Animation

on:
  # Run automatically on a schedule (every 12 hours)
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever main is updated
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=%238B5CF6&color_dots=%23120F1F,%230C2D43,%238B5CF6,%2338BDF8,%2334D399
            dist/snake-light.svg?palette=github-light&color_snake=%238B5CF6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
