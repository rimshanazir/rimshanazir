<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" role="img" aria-label="Animated glowing circuit lines with travelling light pulses.">
  <title>Glowing Lines</title>
  <defs>
    <linearGradient id="glLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glGlow" x="-10%" y="-100%" width="120%" height="300%"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- static circuit tracks -->
  <g stroke="url(#glLine)" stroke-width="1.5" fill="none">
    <path d="M0 20 H 400 L 430 30 H 780 L 810 12 H 1200"/>
    <path d="M0 40 H 250 L 280 30 H 650 L 680 48 H 1200"/>
  </g>
  <!-- connection nodes -->
  <g fill="#0D0B16" stroke="#8B5CF6" stroke-width="1.5">
    <circle cx="430" cy="30" r="3.5"><animate attributeName="stroke" values="#8B5CF6;#8B5CF6;#8B5CF6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="12" r="3.5" stroke="#38BDF8"/>
    <circle cx="280" cy="30" r="3.5" stroke="#34D399"/>
    <circle cx="680" cy="48" r="3.5" stroke="#8B5CF6"/>
  </g>
  <!-- travelling pulses -->
  <g fill="#F8FAFC" filter="url(#glGlow)">
    <circle r="3" cy="20">
      <animateMotion path="M0 0 H 400 L 30 10 H 350 L 30 -18 H 390" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#8B5CF6;#8B5CF6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#34D399">
      <animateMotion path="M0 40 H 250 L 30 -10 H 370 L 30 18 H 520" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
