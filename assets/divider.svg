<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="Decorative animated gradient divider line.">
  <title>Section Divider</title>
  <defs>
    <linearGradient id="divGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F8FAFC" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0"/>
    </linearGradient>
    <filter id="divGlow" x="-20%" y="-400%" width="140%" height="900%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <line x1="80" y1="20" x2="1120" y2="20" stroke="url(#divGrad)" stroke-width="2"/>
  <!-- moving light along the line -->
  <line x1="0" y1="20" x2="200" y2="20" stroke="url(#divSweep)" stroke-width="3" filter="url(#divGlow)">
    <animate attributeName="x1" values="80;920" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="280;1120" dur="4s" repeatCount="indefinite"/>
  </line>
  <!-- center diamond -->
  <g transform="translate(600 20)">
    <rect x="-6" y="-6" width="12" height="12" fill="#8B5CF6" transform="rotate(45)">
      <animate attributeName="fill" values="#8B5CF6;#8B5CF6;#0C2D43;#8B5CF6" dur="6s" repeatCount="indefinite"/>
    </rect>
    <circle r="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="8;16;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
