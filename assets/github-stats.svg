<style>
  text{font-family:'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;}
  .h{font-size:15px;font-weight:700;fill:#F5F5F7;letter-spacing:2.6px;}
  .handle{font-size:12px;fill:#6E6A85;}
  .val{font-size:30px;font-weight:700;fill:#C9BEFF;letter-spacing:-1px;}
  .lbl{font-size:9.5px;font-weight:600;fill:#7C7590;letter-spacing:1.8px;}
  .big{font-size:28px;font-weight:700;fill:#C9BEFF;letter-spacing:-0.9px;}
  .meta{font-size:9.5px;font-weight:600;fill:#5A566E;letter-spacing:1.6px;}

  .fin{animation:fin .8s ease-out both;}
  @keyframes fin{from{opacity:0}to{opacity:1}}
  .tile{animation:tile .75s cubic-bezier(.2,.75,.25,1) both;}
  @keyframes tile{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
  .blink{animation:blink 2.6s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .dot{transform-box:fill-box;transform-origin:center;animation:dot 1.8s ease-in-out infinite;}
  @keyframes dot{0%,100%{opacity:.28;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  .swipe{animation:swipe 9s cubic-bezier(.5,0,.5,1) infinite;}
  @keyframes swipe{0%{transform:translateX(-320px);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateX(720px);opacity:0}}
  .breathe{animation:breathe 7s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .fin,.tile,.blink,.dot,.swipe,.breathe{animation:none;}
  }
</style>

