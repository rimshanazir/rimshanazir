<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" role="img" aria-label="GitHub stats for rimshanazir: 1 repository, 1 follower, 0 following, 1 total star, 11 contributions in the last 12 months.">
