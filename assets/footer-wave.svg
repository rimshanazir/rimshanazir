<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" role="img" aria-label="Animated glowing wave footer with a thank you message.">
  <title>Footer Wave</title>
  <defs>
    <linearGradient id="fwBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0B16"/><stop offset="0.6" stop-color="#120F1F"/><stop offset="1" stop-color="#0C2D43"/>
    </linearGradient>
    <linearGradient id="fwWave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="fwWave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0.32"/>
    </linearGradient>
    <clipPath id="fwClip"><rect width="1200" height="200"/></clipPath>
  </defs>
  <g clip-path="url(#fwClip)">
    <rect width="1200" height="200" fill="url(#fwBg)"/>

    <!-- back wave -->
    <path fill="url(#fwWave2)" d="M0 120 Q 150 80 300 120 T 600 120 T 900 120 T 1200 120 V 200 H 0 Z">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="M0 120 Q 150 80 300 120 T 600 120 T 900 120 T 1200 120 V 200 H 0 Z;
                M0 120 Q 150 160 300 120 T 600 120 T 900 120 T 1200 120 V 200 H 0 Z;
                M0 120 Q 150 80 300 120 T 600 120 T 900 120 T 1200 120 V 200 H 0 Z"/>
    </path>
    <!-- front wave -->
    <path fill="url(#fwWave1)" d="M0 140 Q 150 100 300 140 T 600 140 T 900 140 T 1200 140 V 200 H 0 Z">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="M0 140 Q 150 180 300 140 T 600 140 T 900 140 T 1200 140 V 200 H 0 Z;
                M0 140 Q 150 100 300 140 T 600 140 T 900 140 T 1200 140 V 200 H 0 Z;
                M0 140 Q 150 180 300 140 T 600 140 T 900 140 T 1200 140 V 200 H 0 Z"/>
    </path>

    <!-- floating bubbles -->
    <g fill="#F8FAFC" opacity="0.5">
      <circle cx="200" cy="150" r="2"><animate attributeName="cy" values="150;120;150" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="160" r="2.5" fill="#8B5CF6"><animate attributeName="cy" values="160;130;160" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="850" cy="150" r="2" fill="#34D399"><animate attributeName="cy" values="150;125;150" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="160" r="2.5" fill="#FACC15"><animate attributeName="cy" values="160;130;160" dur="5.5s" repeatCount="indefinite"/></circle>
    </g>

    <text x="600" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#F8FAFC">Thanks for visiting! ✨</text>
    <text x="600" y="98" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="500" fill="#9CA3AF">Let's build something intelligent together.</text>
  </g>
</svg>
