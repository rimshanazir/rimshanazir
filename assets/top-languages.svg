  <g class="row" style="animation-delay:0.98s">
    <circle cx="300" cy="206" r="5" fill="#22D3EE"/>
    <circle cx="300" cy="206" r="5" fill="#22D3EE" class="dotglow" style="animation-delay:-1.6s"/>
    <text x="318" y="210" class="lname">TypeScript</text>
