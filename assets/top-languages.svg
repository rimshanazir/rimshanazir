</g>

<circle cx="152" cy="180" r="56" fill="none" stroke="#17171F" stroke-width="23"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#7C5CFF" stroke-width="23" stroke-linecap="butt" stroke-dasharray="146.89 351.86" class="s0" transform="rotate(-90.00 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#A996FF" stroke-width="23" stroke-linecap="butt" stroke-dasharray="72.30 351.86" class="s1" transform="rotate(63.36 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#F5A524" stroke-width="23" stroke-linecap="butt" stroke-dasharray="42.04 351.86" class="s2" transform="rotate(140.40 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#FB7185" stroke-width="23" stroke-linecap="butt" stroke-dasharray="31.13 351.86" class="s3" transform="rotate(186.48 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#22D3EE" stroke-width="23" stroke-linecap="butt" stroke-dasharray="19.87 351.86" class="s4" transform="rotate(221.40 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#34D399" stroke-width="23" stroke-linecap="butt" stroke-dasharray="12.13 351.86" class="s5" transform="rotate(244.80 152 180)"/>
  <circle cx="152" cy="180" r="56" fill="none" stroke="#6E6A85" stroke-width="23" stroke-linecap="butt" stroke-dasharray="6.50 351.86" class="s6" transform="rotate(260.28 152 180)"/>
<g class="fin" style="animation-delay:1.35s">
  <text x="152" y="178" class="big" text-anchor="middle">7</text>
  <text x="152" y="196" class="small" text-anchor="middle">LANGS</text>
</g>

