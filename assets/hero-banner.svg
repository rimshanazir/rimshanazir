<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Hi, I'm Rimsha Nazir — AI Marketing Engineer. Building AI Automations, Lead Generation and Email Marketing.">
  <title>Rimsha Nazir — AI Marketing Engineer</title>

  <!-- ============ DEFINITIONS ============ -->
  <defs>
    <!-- Base background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0B16"/>
      <stop offset="0.55" stop-color="#0F0D18"/>
      <stop offset="1" stop-color="#0D0B16"/>
    </linearGradient>

    <!-- Animated aurora glow -->
    <!-- soft purple lighting (subtle, keeps page ~85% dark) -->
    <radialGradient id="auroraA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <!-- deep-blue lighting layer for cinematic premium depth -->
    <radialGradient id="auroraC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0C2D43" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0"/>
    </radialGradient>

    <!-- Neon border sweep gradient -->
    <linearGradient id="neonBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0C2D43"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glass card gradient — layered: glass surface fading into deep-blue accent -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#120F1F" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0C2D43" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle purple halo behind the static name -->
    <filter id="titleGlow" x="-25%" y="-90%" width="150%" height="280%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Digital grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8B5CF6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <clipPath id="frameClip"><rect x="0" y="0" width="1200" height="400" rx="24"/></clipPath>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g clip-path="url(#frameClip)">
    <rect width="1200" height="400" fill="url(#bgGrad)"/>
    <rect width="1200" height="400" fill="url(#grid)"/>

    <!-- Moving aurora blobs -->
    <g filter="url(#softGlow)">
      <circle r="260" fill="url(#auroraA)">
        <animate attributeName="cx" values="220;360;220" dur="14s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="120;220;120" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle r="240" fill="url(#auroraB)">
        <animate attributeName="cx" values="980;840;980" dur="16s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="260;140;260" dur="16s" repeatCount="indefinite"/>
      </circle>
      <circle r="200" fill="url(#auroraC)">
        <animate attributeName="cx" values="640;720;640" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="320;260;320" dur="18s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ============ NEURAL NETWORK / AI CIRCUITS (right side) ============ -->
    <g stroke-linecap="round" opacity="0.9">
      <!-- connection lines -->
      <g stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.5">
        <path d="M900 90 L1000 150 L1080 110"/>
        <path d="M900 90 L980 210 L1080 240"/>
        <path d="M1000 150 L980 210"/>
        <path d="M940 300 L1000 150"/>
        <path d="M940 300 L1080 240"/>
        <path d="M1080 110 L1120 190 L1080 240"/>
      </g>
      <!-- travelling pulse on a circuit path -->
      <path id="pulsePath" d="M900 90 L1000 150 L980 210 L940 300" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" from="160" to="0" dur="3s" repeatCount="indefinite"/>
      </path>

      <!-- nodes -->
      <g fill="#0D0B16" stroke="#8B5CF6" stroke-width="2">
        <circle cx="900" cy="90" r="7"><animate attributeName="stroke" values="#8B5CF6;#38BDF8;#8B5CF6" dur="5s" repeatCount="indefinite"/></circle>
        <circle cx="1000" cy="150" r="6"><animate attributeName="r" values="6;9;6" dur="3.5s" repeatCount="indefinite"/></circle>
        <circle cx="1080" cy="110" r="5" stroke="#34D399"><animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
        <circle cx="980" cy="210" r="6" stroke="#8B5CF6"><animate attributeName="r" values="6;8;6" dur="4s" begin="0.5s" repeatCount="indefinite"/></circle>
        <circle cx="1080" cy="240" r="5" stroke="#8B5CF6"/>
        <circle cx="1120" cy="190" r="4" stroke="#38BDF8"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/></circle>
        <circle cx="940" cy="300" r="6" stroke="#0C2D43"><animate attributeName="r" values="6;9;6" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ============ FLOATING PARTICLES ============ -->
    <g fill="#8B5CF6">
      <circle cx="120" cy="330" r="2.5" opacity="0.7"><animate attributeName="cy" values="330;300;330" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="360" r="2" fill="#8B5CF6" opacity="0.6"><animate attributeName="cy" values="360;320;360" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="80" r="2" fill="#34D399" opacity="0.6"><animate attributeName="cy" values="80;110;80" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="60" r="2.5" fill="#F97316" opacity="0.55"><animate attributeName="cy" values="60;90;60" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.7;0.2" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="200" cy="120" r="1.8" fill="#8B5CF6" opacity="0.5"><animate attributeName="cy" values="120;95;120" dur="7.5s" repeatCount="indefinite"/></circle>
      <circle cx="820" cy="350" r="2" fill="#FACC15" opacity="0.5"><animate attributeName="cy" values="350;320;350" dur="6.5s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ============ GLASS CARD + TEXT ============ -->
    <g>
      <rect x="60" y="96" width="640" height="210" rx="20" fill="url(#glass)" stroke="url(#neonBorder)" stroke-width="1.5"/>
      <!-- inner subtle top highlight -->
      <rect x="61" y="97" width="638" height="60" rx="19" fill="#F8FAFC" opacity="0.03"/>

      <!-- status pill -->
      <g transform="translate(88,124)">
        <rect width="176" height="26" rx="13" fill="#34D399" opacity="0.14"/>
        <circle cx="18" cy="13" r="4" fill="#34D399"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
        <text x="32" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#34D399" letter-spacing="1">AVAILABLE FOR WORK</text>
      </g>

      <!-- greeting — STATIC solid-white name, strongest element on the page.
           Layer 1: soft purple glow copy behind · Layer 2: crisp white text on top.
           No animation on the text itself. -->
      <text x="88" y="192" font-family="'Segoe UI',Arial,sans-serif" font-size="41" font-weight="800" letter-spacing="0.4" fill="#8B5CF6" opacity="0.5" filter="url(#titleGlow)">Hi, I'm Rimsha Nazir</text>
      <text x="88" y="192" font-family="'Segoe UI',Arial,sans-serif" font-size="41" font-weight="800" letter-spacing="0.4" fill="#F8FAFC">Hi, I'm Rimsha Nazir</text>

      <!-- role (subtitle) — solid & always readable -->
      <text x="88" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#8B5CF6">AI Marketing Engineer</text>

      <!-- tagline -->
      <text x="88" y="262" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="500" fill="#9CA3AF">Building AI Automations
        <tspan fill="#8B5CF6"> • </tspan>Lead Generation<tspan fill="#8B5CF6"> • </tspan>Email Marketing</text>

      <!-- animated underline accent -->
      <rect x="88" y="278" width="120" height="3" rx="1.5" fill="#8B5CF6">
        <animate attributeName="width" values="40;220;40" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#8B5CF6;#8B5CF6;#0C2D43;#8B5CF6" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- animated neon frame border -->
    <rect x="2" y="2" width="1196" height="396" rx="23" fill="none" stroke="url(#neonBorder)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
