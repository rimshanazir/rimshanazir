<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="Futuristic AI background with flowing gradients, grid and drifting particles.">
  <title>AI Background</title>
  <defs>
    <linearGradient id="abBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0B16"/>
      <stop offset="0.6" stop-color="#0F0D18"/>
      <stop offset="1" stop-color="#0C2D43"/>
    </linearGradient>
    <radialGradient id="abGlowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.5"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="abGlowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.45"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <!-- deep-blue lighting layer for premium depth -->
    <radialGradient id="abGlowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0C2D43" stop-opacity="0.55"/><stop offset="1" stop-color="#0C2D43" stop-opacity="0"/>
    </radialGradient>
    <pattern id="abGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#8B5CF6" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="abBlur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="10"/></filter>
    <clipPath id="abClip"><rect width="1200" height="220" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#abClip)">
    <rect width="1200" height="220" fill="url(#abBg)"/>
    <rect width="1200" height="220" fill="url(#abGrid)"/>
    <g filter="url(#abBlur)">
      <circle r="180" fill="url(#abGlowA)"><animate attributeName="cx" values="200;500;200" dur="15s" repeatCount="indefinite"/><animate attributeName="cy" values="80;140;80" dur="15s" repeatCount="indefinite"/></circle>
      <circle r="160" fill="url(#abGlowB)"><animate attributeName="cx" values="950;700;950" dur="17s" repeatCount="indefinite"/><animate attributeName="cy" values="150;70;150" dur="17s" repeatCount="indefinite"/></circle>
      <circle r="140" fill="url(#abGlowC)"><animate attributeName="cx" values="600;680;600" dur="13s" repeatCount="indefinite"/><animate attributeName="cy" values="180;120;180" dur="13s" repeatCount="indefinite"/></circle>
    </g>
    <!-- drifting particles -->
    <g fill="#F8FAFC">
      <circle cx="150" cy="60" r="1.6" opacity="0.6"><animate attributeName="cx" values="150;1250" dur="22s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="150" r="2" opacity="0.5" fill="#8B5CF6"><animate attributeName="cx" values="80;1250" dur="28s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="110" r="1.4" opacity="0.5" fill="#8B5CF6"><animate attributeName="cx" values="300;1250" dur="25s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="40" r="1.8" opacity="0.55" fill="#34D399"><animate attributeName="cx" values="500;1250" dur="30s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="180" r="1.5" opacity="0.55" fill="#F97316"><animate attributeName="cx" values="700;1250" dur="26s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
